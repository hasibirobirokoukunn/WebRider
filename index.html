<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Man Web Swing Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #ff3333;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="instructions">画面をマウスクリック（またはタップ）で上のビルにウェブを発射！</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 画面サイズ設定
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // ゲームの定数
        const GRAVITY = 0.4;
        const ROPE_SLACK = 1.05; // ロープの遊び

        // プレイヤー（スパイダーマン風の球体）
        const player = {
            x: 200,
            y: canvas.height / 2,
            vx: 5,
            vy: 0,
            radius: 15,
            color: "#ff3333" // スパイダーレッド
        };

        // ウェブ（ロープ）の状態
        let rope = {
            active: false,
            anchorX: 0,
            anchorY: 0,
            length: 0
        };

        // ビル（天井のアンカーポイント用）の並び
        let buildings = [];
        function createBuildings() {
            buildings = [];
            for (let i = 0; i < 20; i++) {
                buildings.push({
                    x: i * 300 + Math.random() * 100,
                    y: 50 + Math.random() * 100,
                    width: 120,
                    height: 200
                });
            }
        }
        createBuildings();

        let score = 0;

        // マウス・タップイベント
        window.addEventListener("mousedown", (e) => attachRope(e.clientX, e.clientY));
        window.addEventListener("mouseup", detachRope);
        window.addEventListener("touchstart", (e) => attachRope(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener("touchend", detachRope);

        function attachRope(mouseX, mouseY) {
            // プレイヤーより上にある、一番近いビルを探してウェブを固定する
            let closestBuilding = null;
            let minDist = 99999;

            buildings.forEach(b => {
                let anchorX = b.x + b.width / 2;
                let anchorY = b.y;
                let dist = Math.hypot(anchorX - player.x, anchorY - player.y);
                
                if (dist < minDist && anchorY < player.y) {
                    minDist = dist;
                    closestBuilding = b;
                }
            });

            if (closestBuilding) {
                rope.anchorX = closestBuilding.x + closestBuilding.width / 2;
                rope.anchorY = closestBuilding.y;
                rope.length = Math.hypot(rope.anchorX - player.x, rope.anchorY - player.y) * ROPE_SLACK;
                rope.active = true;
            }
        }

        function detachRope() {
            rope.active = false;
        }

        // ゲームループ
        function update() {
            // 重力の適用
            player.vy += GRAVITY;

            // ウェブ（ロープ）の物理演算（振り子運動）
            if (rope.active) {
                let dx = player.x - rope.anchorX;
                let dy = player.y - rope.anchorY;
                let dist = Math.hypot(dx, dy);

                // ロープが張り詰めたら、引っ張られる処理
                if (dist > rope.length) {
                    let nx = dx / dist;
                    let ny = dy / dist;
// ここ（今の「速度を消す処理」）が弱い
let velAlongNormal = player.vx * nx + player.vy * ny;
if (velAlongNormal > 0) {
    player.vx -= velAlongNormal * nx;
    player.vy -= velAlongNormal * ny;
}

                    // 位置の強制補正
                    player.x = rope.anchorX + nx * rope.length;
                    player.y = rope.anchorY + ny * rope.length;
                }
            }

            // 位置の更新
            player.x += player.vx;
            player.y += player.vy;

            // カメラの追従（プレイヤーが画面中央にくるように背景を動かす）
            let cameraX = player.x - 200;

            // ビルが画面外に消えたら右側に再配置（無限スクロール）
            buildings.forEach(b => {
                if (b.x - cameraX < -200) {
                    b.x += 200 * 30; 
                }
            });

            // スコア更新
            score = Math.max(score, Math.floor(player.x / 10));
            document.getElementById("score").innerText = score;

            // ゲームオーバー判定（画面下に落ちたらリセット）
            if (player.y > canvas.height + 50) {
                alert("ゲームオーバー！ スコア: " + score);
                player.x = 200;
                player.y = canvas.height / 2;
                player.vx = 5;
                player.vy = 0;
                rope.active = false;
                createBuildings();
            }

            // --- 描画処理 ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-cameraX, 0);

            // ビル（背景）の描画
            buildings.forEach(b => {
                ctx.fillStyle = "#1a252f";
                ctx.fillRect(b.x, b.y, b.width, canvas.height);
                // 窓の明かり
                ctx.fillStyle = "#f1c40f";
                for (let wx = b.x + 15; wx < b.x + b.width - 15; wx += 30) {
                    for (let wy = b.y + 20; wy < canvas.height; wy += 40) {
                        if (Math.random() > 0.3) ctx.fillRect(wx, wy, 10, 15);
                    }
                }
            });

            // クモの糸（ウェブ）の描画
            if (rope.active) {
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(rope.anchorX, rope.anchorY);
                ctx.stroke();
                
                // アンカーポイントの光効果
                ctx.fillStyle = "#00ffff";
                ctx.beginPath();
                ctx.arc(rope.anchorX, rope.anchorY, 6, 0, Math.PI * 2);
                ctx.fill();
            }

            // プレイヤー（スパイダーマン）の描画
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // スパイダーマークっぽい模様（簡易）
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(player.x - player.radius, player.y);
            ctx.lineTo(player.x + player.radius, player.y);
            ctx.moveTo(player.x, player.y - player.radius);
            ctx.lineTo(player.x, player.y + player.radius);
            ctx.stroke();

            ctx.restore();

            requestAnimationFrame(update);
        }

        update();

        // 画面サイズ変更対応
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
