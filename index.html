<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider Swing</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
}
canvas {
    display: block;
}
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: Arial;
    font-size: 18px;
}
</style>
</head>

<body>

<div id="ui">SCORE: <span id="score">0</span></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== 物理 =====
const GRAVITY = 0.25;
const ROPE_POWER = 0.15;

// ===== プレイヤー =====
const player = {
    x: 200,
    y: canvas.height / 2,
    vx: 5,
    vy: 0,
    r: 15
};

// ===== カメラ =====
let cameraX = 0;

// ===== ロープ =====
let rope = {
    active: false,
    ax: 0,
    ay: 0,
    len: 0
};

// ===== ビル =====
let buildings = [];

function createBuildings() {
    buildings = [];

    for (let i = 0; i < 40; i++) {
        buildings.push({
            x: i * 300,
            w: 120,
            h: 300 + Math.random() * 200
        });
    }
}

createBuildings();

// ===== スコア =====
let score = 0;

// ===== 入力 =====
window.addEventListener("mousedown", (e) => shoot(e.clientX, e.clientY));
window.addEventListener("mouseup", () => rope.active = false);
window.addEventListener("touchstart", (e) => shoot(e.touches[0].clientX, e.touches[0].clientY));
window.addEventListener("touchend", () => rope.active = false);

// ===== ロープ発射 =====
function shoot(mx, my) {

    let dx = mx + cameraX - player.x;
    let dy = my - player.y;

    let dist = Math.hypot(dx, dy);
    if (dist === 0) return;

    let dxn = dx / dist;
    let dyn = dy / dist;

    for (let i = 0; i < 800; i += 20) {

        let px = player.x + dxn * i;
        let py = player.y + dyn * i;

        for (let b of buildings) {
            if (
                px > b.x &&
                px < b.x + b.w &&
                py > 0 &&
                py < canvas.height
            ) {
                rope.ax = b.x + b.w / 2;
                rope.ay = 0;
                rope.len = Math.hypot(
                    rope.ax - player.x,
                    rope.ay - player.y
                ) * 1.05;

                rope.active = true;
                return;
            }
        }
    }
}

// ===== 更新 =====
function update() {

    // 重力
    player.vy += GRAVITY;

    // ロープ
    if (rope.active) {
        let dx = player.x - rope.ax;
        let dy = player.y - rope.ay;

        let dist = Math.hypot(dx, dy);

        if (dist > rope.len) {
            let nx = dx / dist;
            let ny = dy / dist;

            let stretch = dist - rope.len;

            player.vx -= nx * stretch * ROPE_POWER;
            player.vy -= ny * stretch * ROPE_POWER;
        }
    }

    // 移動
    player.x += player.vx;
    player.y += player.vy;

    // カメラ
    cameraX = player.x - 200;

    // 無限ビル
    for (let b of buildings) {
        if (b.x - cameraX < -300) {
            b.x += buildings.length * 300;
        }
    }

    // スコア
    score = Math.max(score, Math.floor(player.x / 10));
    document.getElementById("score").innerText = score;

    // 死亡
    if (player.y > canvas.height + 200) {
        player.x = 200;
        player.y = canvas.height / 2;
        player.vx = 5;
        player.vy = 0;
        rope.active = false;
    }

    draw();
    requestAnimationFrame(update);
}

// ===== 描画 =====
function draw() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // ビル
    for (let b of buildings) {

        ctx.fillStyle = "#1a252f";
        ctx.fillRect(b.x, 0, b.w, b.h);

        // 窓（固定でチラつかない）
        ctx.fillStyle = "#f1c40f";

        for (let y = 30; y < b.h; y += 50) {
            for (let x = 20; x < b.w; x += 30) {
                if (Math.random() > 0.85) {
                    ctx.fillRect(b.x + x, y, 8, 12);
                }
            }
        }
    }

    // ロープ
    if (rope.active) {
        ctx.strokeStyle = "white";
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(rope.ax, rope.ay);
        ctx.stroke();
    }

    // プレイヤー
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

update();
</script>

</body>
</html>
