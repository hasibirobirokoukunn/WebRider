<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider Swing</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
}
canvas { display:block; }
#ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:20px;
}
</style>
</head>

<body>
<div id="ui">SCORE: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🌍 重力（弱くした）
const GRAVITY = 0.2;
const ROPE_SLACK = 1.05;

// 🧍 プレイヤー（最初落下しないように安定）
const player = {
    x: 200,
    y: canvas.height / 2,
    vx: 5,
    vy: 0,
    radius: 15,
    color: "#ff3333"
};

// 🧠 カメラ（重要：グローバル化）
let cameraX = 0;

// 🪢 ロープ
let rope = {
    active: false,
    anchorX: 0,
    anchorY: 0,
    length: 0
};

// 🏙 ビル生成
let buildings = [];
function createBuildings() {
    buildings = [];
    for (let i = 0; i < 30; i++) {
        buildings.push({
            x: i * 300,
            y: 100,
            width: 120,
            height: 400
        });
    }
}
createBuildings();

let score = 0;

// 🎮 入力
window.addEventListener("mousedown", (e) => attachRope(e.clientX, e.clientY));
window.addEventListener("mouseup", () => rope.active = false);
window.addEventListener("touchstart", (e) => attachRope(e.touches[0].clientX, e.touches[0].clientY));
window.addEventListener("touchend", () => rope.active = false);

// 🪢 ロープ発射（クリック方向）
function attachRope(mouseX, mouseY) {

    let dx = mouseX + cameraX - player.x;
    let dy = mouseY - player.y;

    let length = Math.hypot(dx, dy);
    if (length === 0) return;

    let dirX = dx / length;
    let dirY = dy / length;

    let step = 20;
    let maxDist = 800;

    for (let i = 0; i < maxDist; i += step) {
        let checkX = player.x + dirX * i;
        let checkY = player.y + dirY * i;

        for (let b of buildings) {
            if (
                checkX > b.x &&
                checkX < b.x + b.width &&
                checkY > b.y
            ) {
                rope.anchorX = b.x + b.width / 2;
                rope.anchorY = b.y;
                rope.length = Math.hypot(
                    rope.anchorX - player.x,
                    rope.anchorY - player.y
                ) * ROPE_SLACK;

                rope.active = true;
                return;
            }
        }
    }
}

// 🎮 メインループ
function update() {

    // 🌍 重力（弱め）
    player.vy += GRAVITY;

    // 🪢 ロープ物理（バネ）
    if (rope.active) {
        let dx = player.x - rope.anchorX;
        let dy = player.y - rope.anchorY;

        let dist = Math.hypot(dx, dy);

        if (dist > rope.length) {
            let nx = dx / dist;
            let ny = dy / dist;

            let stretch = dist - rope.length;
            let strength = 0.15;

            player.vx -= nx * stretch * strength;
            player.vy -= ny * stretch * strength;
        }
    }

    // 🚶 移動
    player.x += player.vx;
    player.y += player.vy;

    // 🎥 カメラ
    cameraX = player.x - 200;

    // 🏙 無限ビル
    for (let b of buildings) {
        if (b.x - cameraX < -300) {
            b.x += 300 * buildings.length;
        }
    }

    // 📊 スコア
    score = Math.max(score, Math.floor(player.x / 10));
    document.getElementById("score").innerText = score;

    // 💀 落下リセット
    if (player.y > canvas.height + 100) {
        player.x = 200;
        player.y = canvas.height / 2;
        player.vx = 5;
        player.vy = 0;
        rope.active = false;
    }

    // 🎨 描画
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // 🏙 ビル
    ctx.fillStyle = "#1a252f";
    for (let b of buildings) {
        ctx.fillRect(b.x, b.y, b.width, canvas.height);
    }

    // 🪢 ロープ
    if (rope.active) {
        ctx.strokeStyle = "white";
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(rope.anchorX, rope.anchorY);
        ctx.stroke();
    }

    // 🧍 プレイヤー
    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();

    requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
