<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider Swing</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #ui {
    position: absolute;
    top: 20px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    pointer-events: none;
    z-index: 10;
  }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.3s;
  }

  #overlay.hidden {
    display: none;
  }

  .overlay-title {
    font-size: 60px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 30px #e63946;
    margin-bottom: 10px;
    text-align: center;
  }

  .overlay-subtitle {
    font-size: 16px;
    color: #e63946;
    letter-spacing: 3px;
    margin-bottom: 50px;
    text-align: center;
  }

  .overlay-hint {
    font-size: 36px;
    color: #fff;
    letter-spacing: 2px;
    animation: pulse 0.5s infinite;
    font-weight: 900;
    padding: 30px 60px;
    border: 4px solid #ffd60a;
    border-radius: 15px;
    background: linear-gradient(135deg, rgba(255, 214, 10, 0.3), rgba(255, 100, 10, 0.2));
    text-shadow: 0 0 30px #ffd60a, 0 0 60px #ff6400;
    box-shadow: 0 0 40px rgba(255, 214, 10, 0.6), inset 0 0 20px rgba(255, 214, 10, 0.2);
  }

  .overlay-score {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.6);
    margin-top: 20px;
  }

  @keyframes blink {
    0%, 50%, 100% {
      opacity: 1;
    }
    25%, 75% {
      opacity: 0.3;
    }
  }

  @keyframes pulse {
    0%, 100% {
      transform: scale(1);
      opacity: 1;
    }
    50% {
      transform: scale(1.05);
      opacity: 0.8;
    }
  }
</style>
</head>
<body>

<div id="ui">
  <div>SCORE: <span id="score-val">0</span></div>
  <div>COINS: <span id="coin-val">0</span></div>
  <div>BEST: <span id="best-val">0</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="overlay">
  <div class="overlay-title">SPIDER<br>SWING</div>
  <div class="overlay-subtitle">City Runner</div>
  <div class="overlay-hint" id="hint">Click or Tap to Start</div>
  <div class="overlay-score" id="gameover-text"></div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreVal = document.getElementById('score-val');
const coinVal = document.getElementById('coin-val');
const bestVal = document.getElementById('best-val');
const hintEl = document.getElementById('hint');
const gameoverTextEl = document.getElementById('gameover-text');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Game state
let gameState = 'title'; // title, playing, gameover
let score = 0;
let bestScore = localStorage.getItem('spiderSwingBest') ? parseInt(localStorage.getItem('spiderSwingBest')) : 0;
let frameCount = 0;
let coinCount = 0;

// Physics constants
const GRAVITY = 0.12;
const ROPE_STIFFNESS = 0.28;
const DAMPING = 0.92;
const MAX_SPEED = 36;

// Player
let player = {
  x: 250,
  y: canvas.height * 0.4,
  vx: 4,
  vy: 0,
  r: 12
};

// Camera
let cameraX = 0;
let cameraY = 0;

// Rope
let rope = {
  active: false,
  ax: 0,
  ay: 0,
  len: 0
};

// Buildings
let buildings = [];

function createBuildings() {
  buildings = [];
  for (let i = 0; i < 50; i++) {
    const h = 180 + Math.random() * 320;
    const w = 100 + Math.random() * 70;
    buildings.push({
      x: i * 280,
      y: canvas.height - h,
      w: w,
      h: h + canvas.height * 0.4,
      color: `hsl(${210 + Math.random() * 20}, ${12}%, ${9}%)`,
      windows: []
    });
    for (let j = 0; j < 20; j++) {
      buildings[i].windows.push(Math.random() > 0.4);
    }
  }
}

createBuildings();

// Drones
let drones = [];

function spawnDrone(x) {
  drones.push({
    x: x,
    y: canvas.height * 0.3 + Math.random() * canvas.height * 0.4,
    vx: -(1 + Math.random() * 2),
    vy: 0,
    phase: Math.random() * Math.PI * 2,
    r: 12
  });
}

// Coins
let coins = [];

function spawnCoin(x) {
  coins.push({
    x: x,
    y: canvas.height * 0.3 + Math.random() * canvas.height * 0.4,
    r: 8,
    collected: false,
    bobble: Math.random() * Math.PI * 2
  });
}

// Particles
let particles = [];

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      r: 2 + Math.random() * 3,
      life: 1,
      color: color
    });
  }
}

// Web trail
let trail = [];

// Input handlers
document.addEventListener('mousedown', function(e) {
  handleInput(e.clientX, e.clientY);
});

document.addEventListener('touchstart', function(e) {
  handleInput(e.touches[0].clientX, e.touches[0].clientY);
}, false);

document.addEventListener('mouseup', function() {
  rope.active = false;
});

document.addEventListener('touchend', function() {
  rope.active = false;
});

function handleInput(mx, my) {
  if (gameState === 'title') {
    startGame();
    return;
  }
  if (gameState === 'gameover') {
    gameState = 'title';
    overlay.classList.remove('hidden');
    hintEl.textContent = 'Click or Tap to Restart';
    gameoverTextEl.textContent = '';
    return;
  }

  // Shoot rope during gameplay
  shootRope(mx + cameraX, my + cameraY);
}

function startGame() {
  gameState = 'playing';
  overlay.classList.add('hidden');
  score = 0;
  frameCount = 0;
  player.x = 250;
  player.y = canvas.height * 0.4;
  player.vx = 4;
  player.vy = 0;
  rope.active = false;
  drones = [];
  coins = [];
  particles = [];
  trail = [];
  createBuildings();
  scoreVal.textContent = '0';
}

function shootRope(wx, wy) {
  const dx = wx - player.x;
  const dy = wy - player.y;
  const dist = Math.hypot(dx, dy);
  if (dist < 1) return;

  const nx = dx / dist;
  const ny = dy / dist;

  for (let i = 30; i < 1200; i += 10) {
    const px = player.x + nx * i;
    const py = player.y + ny * i;

    for (let b of buildings) {
      if (px > b.x && px < b.x + b.w && py > b.y && py < b.y + b.h) {
        rope.ax = b.x + b.w / 2;
        rope.ay = b.y;
        rope.len = Math.hypot(rope.ax - player.x, rope.ay - player.y) * 0.92;
        rope.active = true;
        return;
      }
    }
  }
}

function update() {
  if (gameState !== 'playing') {
    updateParticles();
    return;
  }

  frameCount++;

  const difficulty = 1 + score / 600;

  // Physics
  player.vy += GRAVITY;

  if (rope.active) {
    const dx = player.x - rope.ax;
    const dy = player.y - rope.ay;
    const dist = Math.hypot(dx, dy);

    if (dist > 0) {
      const nx = dx / dist;
      const ny = dy / dist;

      if (dist > rope.len) {
        const stretch = dist - rope.len;
        player.vx -= nx * stretch * ROPE_STIFFNESS;
        player.vy -= ny * stretch * ROPE_STIFFNESS;

       player.vx *= 1;
　　　　player.vy *= 1;
        
        // ロープで掴んだら前方向に加速
        const boostFactor = Math.min(1, stretch / 80);
        const currentSpeed = Math.hypot(player.vx, player.vy);
        if (currentSpeed > 0) {
          const dirX = player.vx / currentSpeed;
          const dirY = player.vy / currentSpeed;
          player.vx += dirX * boostFactor * 5.5;
          player.vy += dirY * boostFactor * 4;
        }
      }
    }

    player.vx *= DAMPING;
    player.vy *= DAMPING;
  }

  // Speed limit
  const spd = Math.hypot(player.vx, player.vy);
  if (spd > MAX_SPEED) {
    player.vx = (player.vx / spd) * MAX_SPEED;
    player.vy = (player.vy / spd) * MAX_SPEED;
  }

  player.x += player.vx;
  player.y += player.vy;

  // Web trail
  if (rope.active) {
    trail.push({x: player.x, y: player.y, life: 1});
  }
  trail = trail.filter(t => {
    t.life -= 0.08;
    return t.life > 0;
  });

  // Camera follow
  cameraX += (player.x - 250 - cameraX) * 0.1;
  cameraY += (player.y - canvas.height * 0.4 - cameraY) * 0.08;
  cameraY = Math.max(0, Math.min(cameraY, canvas.height * 0.3));

  // Recycle buildings
  for (let b of buildings) {
    if (b.x - cameraX < -300) {
      b.x += 50 * 280;
      b.h = 180 + Math.random() * 320 + canvas.height * 0.4;
      b.w = 100 + Math.random() * 70;
      b.y = canvas.height - (180 + Math.random() * 320);
    }
  }

  // Spawn drones - increase count as score grows
  const maxDroneCount = Math.min(8, 1 + Math.floor(score / 400));
  const droneSpawnRate = Math.max(40, Math.floor(180 / difficulty));
  if (frameCount % droneSpawnRate === 0 && drones.length < maxDroneCount) {
    const spawnCount = score > 800 ? Math.min(2, maxDroneCount - drones.length) : 1;
    for (let i = 0; i < spawnCount; i++) {
      spawnDrone(cameraX + canvas.width + 50 + i * 100);
    }
  }

  // Spawn coins
  if (frameCount % 100 === 0) {
    spawnCoin(cameraX + canvas.width * 0.7 + Math.random() * 200);
  }

  // Update drones
  for (let d of drones) {
    d.phase += 0.05;
    // 上下移動に加えて左右の追跡動作
    d.vy = Math.sin(d.phase) * 1.5;
    d.x += d.vx;
    d.y += d.vy;
    
    // プレイヤー方向に少し向きを変える（自分で追ってくる）
    const dxToPlayer = player.x - d.x;
    const dyToPlayer = player.y - d.y;
    const distToPlayer = Math.hypot(dxToPlayer, dyToPlayer);
    if (distToPlayer > 0 && distToPlayer < 600) {
      // プレイヤーが近いとき、少し方向を変える
      d.vx += (dxToPlayer / distToPlayer) * 0.1;
    }
  }
  // Check collision with drones
  for (let d of drones) {
    if (Math.hypot(d.x - player.x, d.y - player.y) < d.r + player.r + 8) {
      endGame();
      return;
    }
  }
  drones = drones.filter(d => d.x - cameraX > -200);

  // Collect coins
  for (let c of coins) {
    if (!c.collected) {
      if (Math.hypot(c.x - player.x, c.y - player.y) < c.r + player.r) {
        c.collected = true;
        score += 50;
        spawnParticles(c.x, c.y, '#ffd60a', 10);
      }
    }
    c.bobble += 0.08;
  }
  coins = coins.filter(c => !c.collected && c.x - cameraX > -200);

  // Score
  score = Math.max(score, Math.floor(player.x / 12));
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('spiderSwingBest', bestScore);
  }
  scoreVal.textContent = score;
  bestVal.textContent = bestScore;

  // Death check
  if (player.y > canvas.height + 200 || player.x < cameraX - 100) {
    endGame();
    return;
  }

  updateParticles();
}

function updateParticles() {
  for (let p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life -= 0.03;
  }
  particles = particles.filter(p => p.life > 0);
}

function endGame() {
  gameState = 'gameover';
  rope.active = false;
  overlay.classList.remove('hidden');
  hintEl.textContent = 'Click or Tap to Restart';
  gameoverTextEl.textContent = 'Score: ' + score + ' | Best: ' + bestScore;
}

function draw() {
  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bgGrad.addColorStop(0, '#0a0e1a');
  bgGrad.addColorStop(0.5, '#0d1628');
  bgGrad.addColorStop(1, '#132238');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
  for (let i = 0; i < 100; i++) {
    const sx = (i * 137 + 50) % canvas.width;
    const sy = (i * 89 + 30) % (canvas.height * 0.6);
    ctx.fillRect(sx, sy, 1, 1);
  }

  ctx.save();
  ctx.translate(-cameraX, -cameraY);

  // Buildings
  for (let b of buildings) {
    if (b.x - cameraX < canvas.width + 200 && b.x + b.w - cameraX > -200) {
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x, b.y, b.w, b.h);

      // Windows
      const colGap = 25;
      const rowGap = 35;
      for (let col = 0; col < Math.floor(b.w / colGap); col++) {
        for (let row = 0; row < Math.floor((b.h - 60) / rowGap); row++) {
          const wx = b.x + 12 + col * colGap;
          const wy = b.y + 35 + row * rowGap;
          const lit = b.windows[(col * 5 + row) % b.windows.length];

          if (lit) {
            ctx.fillStyle = 'rgba(255, 220, 120, 0.7)';
          } else {
            ctx.fillStyle = 'rgba(40, 80, 140, 0.3)';
          }
          ctx.fillRect(wx, wy, 10, 14);
        }
      }
    }
  }

  // Coins - rotating and bobbing
  for (let c of coins) {
    const cy = c.y + Math.sin(c.bobble) * 5;
    const rotation = frameCount * 0.05;

    // Coin glow
    ctx.fillStyle = 'rgba(255, 214, 10, 0.2)';
    ctx.beginPath();
    ctx.arc(c.x, cy, c.r + 8, 0, Math.PI * 2);
    ctx.fill();

    // Coin body with rotation
    ctx.save();
    ctx.translate(c.x, cy);
    ctx.rotate(rotation);
    
    ctx.fillStyle = '#ffd60a';
    ctx.beginPath();
    ctx.arc(0, 0, c.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#e9c00a';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    
    // Coin shine
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.beginPath();
    ctx.arc(-2, -2, 2, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
  }

  // Drones
  for (let d of drones) {
    ctx.fillStyle = 'rgba(255, 50, 50, 0.2)';
    ctx.beginPath();
    ctx.arc(d.x, d.y, 25, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#2d2d2d';
    ctx.fillRect(d.x - 10, d.y - 5, 20, 10);

    ctx.fillStyle = '#ff3333';
    ctx.beginPath();
    ctx.arc(d.x, d.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Rope
  if (rope.active) {
    ctx.strokeStyle = 'rgba(200, 240, 255, 0.8)';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(rope.ax, rope.ay);
    ctx.stroke();

    ctx.fillStyle = '#88ccff';
    ctx.beginPath();
    ctx.arc(rope.ax, rope.ay, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Web trail
  if (trail.length > 1) {
    for (let i = 1; i < trail.length; i++) {
      const t = trail[i];
      ctx.strokeStyle = 'rgba(150, 200, 255, ' + (t.life * 0.3) + ')';
      ctx.lineWidth = t.life * 1.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
      ctx.lineTo(t.x, t.y);
      ctx.stroke();
    }
  }

  // Player - Ninja
  ctx.save();
  ctx.translate(player.x, player.y);
  
  const angle = Math.atan2(player.vy, player.vx) * 0.3;
  ctx.rotate(angle);

  // Body (purple ninja suit)
  ctx.fillStyle = '#6a1b9a';
  ctx.beginPath();
  ctx.ellipse(0, 1, 9, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#6a1b9a';
  ctx.beginPath();
  ctx.arc(0, -11, 10, 0, Math.PI * 2);
  ctx.fill();

  // Ninja mask (darker purple)
  ctx.fillStyle = '#9c27b0';
  ctx.beginPath();
  ctx.ellipse(0, -10, 8, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (white)
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(-4, -11, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(4, -11, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Eye shine
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-3.5, -11.5, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(4.5, -11.5, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Arms
  ctx.strokeStyle = '#6a1b9a';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(-8, -4);
  ctx.quadraticCurveTo(-14, 0, -16, 6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(8, -4);
  ctx.quadraticCurveTo(14, 0, 16, 6);
  ctx.stroke();

  // Legs (ninja stance)
  ctx.beginPath();
  ctx.moveTo(-5, 12);
  ctx.lineTo(-12, 22);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(5, 12);
  ctx.lineTo(12, 22);
  ctx.stroke();

  ctx.restore();

  // Particles
  for (let p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // 死亡ラインを描画（画面下のみ）
  ctx.strokeStyle = '#ff0000';
  ctx.lineWidth = 3;
  ctx.setLineDash([10, 5]);
  ctx.beginPath();
  ctx.moveTo(0, canvas.height + 200 - cameraY);
  ctx.lineTo(canvas.width, canvas.height + 200 - cameraY);
  ctx.stroke();
  ctx.setLineDash([]);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

bestVal.textContent = bestScore;
gameLoop();
</script>

</body>
</html>
