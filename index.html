<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider Swing - Fixed</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
}
canvas {
    display: block;
}
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: Arial;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 1px 1px 2px black;
}
</style>
</head>

<body>

<div id="ui">SCORE: <span id="score">0</span></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== 物理 =====
const GRAVITY = 0.3;       // 重力を少し強めて自然に
const ROPE_POWER = 0.2;    // ロープの引っ張り強度

// ===== プレイヤー =====
const player = {
    x: 200,
    y: canvas.height / 2,
    vx: 5,
    vy: 0,
    r: 15
};

// ===== カメラ =====
let cameraX = 0;

// ===== ロープ =====
let rope = {
    active: false,
    ax: 0,
    ay: 0,
    len: 0
};

// ===== ビル =====
let buildings = [];

function createBuildings() {
    buildings = [];
    for (let i = 0; i < 40; i++) {
        let bHeight = 250 + Math.random() * 250; // ビルの高さ
        buildings.push({
            x: i * 300,
            w: 140,
            h: bHeight,
            y: canvas.height - bHeight, // 画面の下から生えるように計算
            // 窓の配置をあらかじめデータとして持たせてチラつきを防止
            windows: Array.from({length: 8}, () => Math.random() > 0.4) 
        });
    }
}

createBuildings();

// ===== スコア =====
let score = 0;

// ===== 入力 =====
window.addEventListener("mousedown", (e) => shoot(e.clientX, e.clientY));
window.addEventListener("mouseup", () => rope.active = false);
window.addEventListener("touchstart", (e) => shoot(e.touches[0].clientX, e.touches[0].clientY));
window.addEventListener("touchend", () => rope.active = false);

// ===== ロープ発射 =====
function shoot(mx, my) {
    // クリックした画面の座標を、ゲーム内の絶対座標に変換
    let targetX = mx + cameraX;
    let targetY = my;

    let dx = targetX - player.x;
    let dy = targetY - player.y;

    let dist = Math.hypot(dx, dy);
    if (dist === 0) return;

    let dxn = dx / dist;
    let dyn = dy / dist;

    // プレイヤーからクリック方向へ少しずつ探索（レイキャスト）
    for (let i = 0; i < 1000; i += 10) {
        let px = player.x + dxn * i;
        let py = player.y + dyn * i;

        for (let b of buildings) {
            // 線がビルの範囲（上部含む）に入ったか判定
            if (px > b.x && px < b.x + b.w && py > b.y && py < canvas.height) {
                // ビルの屋上の中心にロープを固定
                rope.ax = b.x + b.w / 2;
                rope.ay = b.y;
                rope.len = Math.hypot(rope.ax - player.x, rope.ay - player.y) * 1.05;
                rope.active = true;
                return;
            }
        }
    }
}

// ===== 更新 =====
function update() {
    // 重力
    player.vy += GRAVITY;

    // ロープ物理
    if (rope.active) {
        let dx = player.x - rope.ax;
        let dy = player.y - rope.ay;
        let dist = Math.hypot(dx, dy);

        // ロープの長さを超えたら引っ張る力を加える
        if (dist > rope.len) {
            let nx = dx / dist;
            let ny = dy / dist;
            let stretch = dist - rope.len;

            player.vx -= nx * stretch * ROPE_POWER;
            player.vy -= ny * stretch * ROPE_POWER;
            
            // スイング中の空気抵抗（これがあると動きが安定します）
            player.vx *= 0.995;
            player.vy *= 0.995;
        }
    }

    // 移動
    player.x += player.vx;
    player.y += player.vy;

    // カメラの追従
    cameraX = player.x - 200;

    // 無限ビル（通り過ぎたら前方に移動）
    for (let b of buildings) {
        if (b.x - cameraX < -300) {
            b.x += buildings.length * 300;
        }
    }

    // スコア
    score = Math.max(score, Math.floor(player.x / 10));
    document.getElementById("score").innerText = score;

    // 死亡判定（画面下に落ちたらリセット）
    if (player.y > canvas.height + 100) {
        player.x = 200;
        player.y = canvas.height / 2;
        player.vx = 5;
        player.vy = 0;
        rope.active = false;
        createBuildings(); // ビルを再配置
    }

    draw();
    requestAnimationFrame(update);
}

// ===== 描画 =====
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // ビルの描画
    for (let b of buildings) {
        // ビルの影
        ctx.fillStyle = "#1a252f";
        ctx.fillRect(b.x, b.y, b.w, b.h);

        // 窓の描画（あらかじめ決まった配列を使うのでチラつかない）
        ctx.fillStyle = "#f1c40f";
        let winIndex = 0;
        for (let y = b.y + 30; y < canvas.height - 20; y += 60) {
            for (let x = 25; x < b.w - 20; x += 35) {
                if (b.windows[winIndex % b.windows.length]) {
                    ctx.fillRect(b.x + x, y, 10, 15);
                }
                winIndex++;
            }
        }
    }

    // ロープの描画
    if (rope.active) {
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(rope.ax, rope.ay);
        ctx.stroke();

        // 的（どこに刺さっているか分かりやすく）
        ctx.fillStyle = "#00ffff";
        ctx.beginPath();
        ctx.arc(rope.ax, rope.ay, 5, 0, Math.PI * 2);
        ctx.fill();
    }

    // プレイヤーの描画
    ctx.fillStyle = "#ff3333";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
    ctx.fill();

    // スパイダー目の簡易描画
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(player.x + 5, player.y - 3, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

// 画面サイズ変更対応
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

update();
</script>

</body>
</html>
