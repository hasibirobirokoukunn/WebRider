<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Spider Game</title>
<style>
  body { margin:0; overflow:hidden; background:#111; }
  canvas { display:block; margin:auto; background:#1a1a1a; }
</style>
</head>
<body>

<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// プレイヤー
let player = {
  x: 400,
  y: 250,
  vx: 0,
  vy: 0
};

// ターゲット（糸の先）
let target = null;
let ropeActive = false;

canvas.addEventListener("click", (e) => {
  const rect = canvas.getBoundingClientRect();
  target = {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
  ropeActive = true;
});

// 更新
function update() {

  // 重力
  player.vy += 0.3;

  // 糸の力
  if (ropeActive && target) {
    let dx = target.x - player.x;
    let dy = target.y - player.y;

    player.vx += dx * 0.02;
    player.vy += dy * 0.02;
  }

  // 摩擦
  player.vx *= 0.98;
  player.vy *= 0.98;

  // 移動
  player.x += player.vx;
  player.y += player.vy;

  // 地面
  if (player.y > canvas.height - 10) {
    player.y = canvas.height - 10;
    player.vy *= -0.5;
  }
}

// 描画
function draw() {
  ctx.clearRect(0,0,800,500);

  // 糸
  if (ropeActive && target) {
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(target.x, target.y);
    ctx.strokeStyle = "white";
    ctx.stroke();
  }

  // プレイヤー（スパイダー）
  ctx.beginPath();
  ctx.arc(player.x, player.y, 10, 0, Math.PI*2);
  ctx.fillStyle = "red";
  ctx.fill();
}

// ループ
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
